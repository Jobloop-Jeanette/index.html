<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norsk & Data – 17. mai</title>
<style>
/* ── FONTS: OpenDyslexic embedded ── */
@font-face {
  font-family: 'Kurs';
  src: local('Arial Rounded MT Bold'), local('Helvetica Neue'), local('sans-serif');
}

:root {
  --red:    #C8102E;
  --blue:   #003087;
  --gold:   #F5A623;
  --green:  #15803D;
  --white:  #FFFFFF;
  --bg:     #F0F4FF;
  --card:   #FFFFFF;
  --ink:    #1a1a2e;
  --gray:   #6B7280;
  --light:  #E2E8F0;
  --red-p:  #FFF0F2;
  --blue-p: #EEF3FD;
  --gold-p: #FFFBEB;
  --grn-p:  #F0FDF4;
  --radius: 20px;
  --shadow: 0 8px 32px rgba(0,48,135,.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── PROGRESS BAR ── */
.prog-wrap { position: fixed; top: 0; left: 0; right: 0; height: 8px; background: var(--light); z-index: 200; }
.prog-fill  { height: 100%; background: linear-gradient(90deg, var(--red), var(--gold)); transition: width .5s ease; border-radius: 0 8px 8px 0; }

/* ── TOP NAV ── */
.top-nav {
  position: fixed; top: 8px; left: 0; right: 0; z-index: 199;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: var(--blue);
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
}
.nav-logo { display: flex; align-items: center; gap: 10px; }
.nav-logo-icon { font-size: 28px; }
.nav-logo-text { color: white; font-size: 16px; font-weight: 900; line-height: 1.1; }
.nav-logo-sub  { color: rgba(255,255,255,.6); font-size: 11px; font-weight: 600; }
.nav-center { display: flex; gap: 6px; }
.module-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(255,255,255,.25); border: none; cursor: pointer;
  transition: all .2s;
}
.module-dot.done   { background: var(--gold); }
.module-dot.active { background: white; transform: scale(1.3); }
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-score { color: var(--gold); font-size: 16px; font-weight: 900; }
.sound-btn {
  background: rgba(255,255,255,.15); border: none; border-radius: 10px;
  color: white; font-size: 20px; padding: 6px 10px; cursor: pointer;
  transition: background .2s;
}
.sound-btn:hover { background: rgba(255,255,255,.3); }

/* ── STAGE ── */
.stage {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 90px 16px 60px;
}

/* ── CARD ── */
.card {
  width: 100%; max-width: 820px;
  background: var(--card);
  border-radius: 28px;
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: slideUp .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(28px) scale(.97); }
  to   { opacity:1; transform: translateY(0)   scale(1);    }
}
.card-header {
  padding: 28px 36px 22px;
  border-bottom: 3px solid var(--light);
  display: flex; align-items: center; gap: 16px;
}
.card-icon   { font-size: 44px; }
.card-title  { font-size: 26px; font-weight: 900; color: var(--blue); line-height: 1.1; }
.card-title span { color: var(--red); }
.card-sub    { font-size: 14px; color: var(--gray); font-weight: 600; margin-top: 2px; }
.card-body   { padding: 28px 36px 32px; }

/* ── INSTRUCTION BOX ── */
.instr {
  background: var(--blue-p); border-left: 6px solid var(--blue);
  border-radius: 0 14px 14px 0; padding: 12px 18px;
  font-size: 17px; font-weight: 800; color: var(--blue);
  margin-bottom: 24px; display: flex; align-items: center; gap: 10px;
}
.instr-icon { font-size: 24px; flex-shrink: 0; }

/* ── NAV BUTTONS ── */
.btn-row { display: flex; gap: 12px; justify-content: space-between; align-items: center; margin-top: 28px; flex-wrap: wrap; }
.btn {
  border: none; border-radius: 14px; padding: 14px 28px;
  font-size: 18px; font-weight: 900; cursor: pointer;
  transition: all .2s; display: flex; align-items: center; gap: 8px;
}
.btn-next { background: var(--blue); color: white; box-shadow: 0 4px 16px rgba(0,48,135,.3); }
.btn-next:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,48,135,.4); }
.btn-prev { background: var(--light); color: var(--gray); }
.btn-prev:hover { background: #d1d5db; }
.btn-check { background: var(--green); color: white; box-shadow: 0 4px 16px rgba(21,128,61,.3); }
.btn-check:hover { transform: translateY(-2px); }
.btn-retry { background: var(--gold); color: var(--ink); }
.btn-speak { background: var(--red-p); color: var(--red); border: 2px solid var(--red); }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
.btn-big {
  width: 100%; padding: 22px; font-size: 22px; border-radius: 18px;
  justify-content: center; margin-top: 10px;
}

/* ── FEEDBACK ── */
.feedback {
  border-radius: 14px; padding: 14px 18px; font-size: 17px; font-weight: 800;
  margin-top: 16px; display: none; animation: popIn .3s;
}
@keyframes popIn { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }
.feedback.show { display: flex; align-items: center; gap: 10px; }
.feedback.good { background: var(--grn-p); color: var(--green); border: 2.5px solid #a7f3d0; }
.feedback.bad  { background: var(--red-p);  color: var(--red);   border: 2.5px solid #fca5a5; }
.feedback.info { background: var(--gold-p); color: #92400e;      border: 2.5px solid #fde68a; }

/* ── WORD CARDS ── */
.word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.word-card {
  border: 3px solid var(--light); border-radius: 18px; padding: 20px 12px;
  text-align: center; cursor: pointer; transition: all .2s;
  background: white; user-select: none;
}
.word-card:hover { border-color: var(--blue); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,48,135,.15); }
.word-card.selected { border-color: var(--gold); background: var(--gold-p); box-shadow: 0 0 0 3px var(--gold); }
.word-card.correct  { border-color: var(--green); background: var(--grn-p); }
.word-card.wrong    { border-color: var(--red);   background: var(--red-p); animation: shake .4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.word-card-emoji { font-size: 52px; display: block; margin-bottom: 10px; }
.word-card-text  { font-size: 18px; font-weight: 900; color: var(--ink); }
.word-card-sub   { font-size: 12px; color: var(--gray); margin-top: 4px; font-weight: 600; }

/* ── MOUSE TRAINER ── */
.mouse-target {
  width: 100px; height: 100px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; cursor: pointer; border: 4px dashed var(--blue);
  position: absolute; transition: transform .15s;
  user-select: none; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,48,135,.4)} 50%{box-shadow:0 0 0 16px rgba(0,48,135,0)} }
.mouse-target:hover { border-style: solid; }
.mouse-target:active { transform: scale(.92); }
.mouse-arena {
  position: relative; width: 100%; height: 300px;
  background: var(--blue-p); border-radius: 18px; border: 3px solid var(--blue-l, #BFD0F0);
  overflow: hidden;
}
.click-counter { font-size: 56px; font-weight: 900; color: var(--blue); text-align: center; margin: 16px 0 8px; }
.click-label   { font-size: 16px; color: var(--gray); text-align: center; font-weight: 700; }

/* ── KEYBOARD TRAINER ── */
.kb-display {
  background: var(--blue); color: white; border-radius: 18px;
  padding: 20px 24px; text-align: center; font-size: 64px; font-weight: 900;
  letter-spacing: 6px; min-height: 110px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px; gap: 10px; flex-wrap: wrap;
}
.kb-char { position: relative; }
.kb-char.done  { color: var(--gold); }
.kb-char.next  { color: white; border-bottom: 4px solid var(--gold); }
.kb-char.wait  { color: rgba(255,255,255,.3); }
.kb-input {
  width: 100%; padding: 16px; font-size: 28px; font-weight: 900; text-align: center;
  border: 4px solid var(--blue); border-radius: 14px; outline: none; color: var(--ink);
  letter-spacing: 4px; background: white; transition: border-color .2s;
}
.kb-input:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(245,166,35,.2); }
.kb-hint { font-size: 14px; color: var(--gray); text-align: center; margin-top: 10px; font-weight: 600; }

/* ── MATCHING ── */
.match-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.match-col-title { font-size: 14px; font-weight: 900; color: var(--gray); text-align: center; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.match-item {
  border: 3px solid var(--light); border-radius: 16px; padding: 14px;
  text-align: center; cursor: pointer; transition: all .2s; background: white;
  font-size: 17px; font-weight: 800; user-select: none; margin-bottom: 10px;
}
.match-item:hover  { border-color: var(--blue); transform: scale(1.02); }
.match-item.sel    { border-color: var(--gold); background: var(--gold-p); box-shadow: 0 0 0 3px var(--gold); }
.match-item.paired { border-color: var(--green); background: var(--grn-p); color: var(--green); pointer-events: none; }
.match-item.wrong-flash { border-color: var(--red); background: var(--red-p); animation: shake .4s; }
.match-emoji { font-size: 36px; display: block; margin-bottom: 6px; }

/* ── QUIZ ── */
.quiz-q { font-size: 20px; font-weight: 900; color: var(--ink); margin-bottom: 20px; line-height: 1.4; }
.quiz-img { font-size: 80px; text-align: center; margin-bottom: 16px; }
.quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.quiz-opt {
  border: 3px solid var(--light); border-radius: 16px; padding: 18px 14px;
  text-align: center; cursor: pointer; font-size: 18px; font-weight: 800;
  transition: all .2s; background: white; user-select: none;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.quiz-opt:hover { border-color: var(--blue); background: var(--blue-p); transform: scale(1.02); }
.quiz-opt.correct { border-color: var(--green); background: var(--grn-p); color: var(--green); }
.quiz-opt.wrong   { border-color: var(--red);   background: var(--red-p);   color: var(--red); }
.quiz-opt.locked  { pointer-events: none; }

/* ── NUMBER GRID ── */
.num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.num-card {
  border: 3px solid var(--light); border-radius: 16px; padding: 20px 8px;
  text-align: center; cursor: pointer; transition: all .2s; background: white;
}
.num-card:hover { border-color: var(--blue); transform: translateY(-3px); }
.num-card.played { border-color: var(--green); background: var(--grn-p); }
.num-big  { font-size: 40px; font-weight: 900; color: var(--blue); }
.num-word { font-size: 14px; font-weight: 800; color: var(--gray); margin-top: 4px; }
.num-dots { font-size: 22px; margin-top: 4px; letter-spacing: 1px; }

/* ── WRITING ── */
.write-target {
  background: var(--blue); color: white; border-radius: 14px;
  padding: 18px 24px; font-size: 48px; font-weight: 900; text-align: center;
  margin-bottom: 16px; letter-spacing: 4px;
}
.write-inp {
  width: 100%; padding: 18px; font-size: 28px; font-weight: 900;
  border: 4px solid var(--light); border-radius: 14px; outline: none;
  text-align: center; letter-spacing: 4px; text-transform: uppercase;
  transition: border-color .2s; background: white; color: var(--ink);
}
.write-inp:focus { border-color: var(--blue); }
.write-inp.correct { border-color: var(--green); background: var(--grn-p); }
.write-inp.wrong   { border-color: var(--red); background: var(--red-p); }

/* ── COVER ── */
.cover-card {
  background: linear-gradient(150deg, var(--blue) 0%, #001a5c 50%, var(--red) 100%);
  min-height: 560px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; padding: 48px 36px;
  border-radius: 28px; position: relative; overflow: hidden;
}
.cover-flag-row { font-size: 40px; letter-spacing: 8px; margin-bottom: 24px; }
.cover-title { font-size: 52px; font-weight: 900; color: white; line-height: 1; margin-bottom: 10px; }
.cover-title span { color: var(--gold); }
.cover-sub { font-size: 18px; color: rgba(255,255,255,.75); font-weight: 700; margin-bottom: 36px; }
.cover-badges { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
.badge {
  background: rgba(255,255,255,.15); border: 2px solid rgba(255,255,255,.3);
  color: white; border-radius: 30px; padding: 8px 18px;
  font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px;
}
.start-btn {
  background: var(--gold); color: var(--ink); border: none; border-radius: 20px;
  padding: 20px 56px; font-size: 24px; font-weight: 900; cursor: pointer;
  box-shadow: 0 8px 32px rgba(245,166,35,.45); transition: all .25s;
}
.start-btn:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 14px 40px rgba(245,166,35,.55); }

/* ── TEACHER TIPS ── */
.tip-box {
  background: var(--gold-p); border: 2.5px solid #fde68a; border-radius: 16px;
  padding: 16px 20px; margin-top: 20px; font-size: 14px; font-weight: 700; color: #92400e;
}
.tip-box-title { font-size: 16px; font-weight: 900; margin-bottom: 8px; }

/* ── DIPLOMA ── */
.diploma-wrap {
  background: linear-gradient(160deg, #fffbf0, #fff5e0);
  border: 6px double var(--gold); border-radius: 24px; padding: 40px;
  text-align: center;
}
.diploma-title { font-size: 52px; font-weight: 900; color: var(--gold); }
.diploma-line  { border-bottom: 3px solid var(--gold); width: 65%; height: 48px; margin: 12px auto 4px; }
.diploma-inp   {
  border: none; border-bottom: 3px solid var(--gold); width: 65%;
  font-size: 26px; font-weight: 900; text-align: center; background: transparent;
  outline: none; color: var(--ink); padding: 8px 0;
}

/* ── SCOREBOARD ── */
.score-row { display: flex; align-items: center; gap: 14px; border: 2.5px solid var(--light); border-radius: 14px; padding: 14px 18px; margin-bottom: 10px; background: white; }
.score-bar-wrap { flex: 1; height: 16px; background: var(--light); border-radius: 10px; overflow: hidden; }
.score-bar      { height: 100%; border-radius: 10px; transition: width 1.2s ease; }
.score-val { font-size: 18px; font-weight: 900; color: var(--blue); min-width: 52px; text-align: right; }

/* ── CONFETTI ── */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 9999; display: none; }
.conf { position: absolute; width: 10px; height: 10px; opacity: 0; animation: fall 3.5s ease-in forwards; border-radius: 2px; }
@keyframes fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

/* ── RESPONSIVE ── */
@media(max-width:600px) {
  .card-header, .card-body { padding: 18px 16px; }
  .cover-title { font-size: 36px; }
  .quiz-opts { grid-template-columns: 1fr; }
  .match-cols { grid-template-columns: 1fr; }
  .num-grid { grid-template-columns: repeat(3,1fr); }
  .word-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<div class="confetti-wrap" id="confettiWrap"></div>
<div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>

<nav class="top-nav">
  <div class="nav-logo">
    <div class="nav-logo-icon">🇳🇴</div>
    <div>
      <div class="nav-logo-text">Norsk & Data</div>
      <div class="nav-logo-sub">17. mai-kurset</div>
    </div>
  </div>
  <div class="nav-center" id="moduleDots"></div>
  <div class="nav-right">
    <button class="sound-btn" onclick="toggleSound()" id="soundBtn" title="Lyd av/på">🔊</button>
    <div class="nav-score">⭐ <span id="scoreDisplay">0</span></div>
  </div>
</nav>

<main class="stage" id="stage"></main>

<script>
// ─── STATE ───────────────────────────────────────────────────
const S = {
  page: 0,
  score: 0,
  sound: true,
  moduleScores: {},
};

// ─── SPEECH ──────────────────────────────────────────────────
function speak(text, lang='no-NO') {
  if (!S.sound) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.82; u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}
function toggleSound() {
  S.sound = !S.sound;
  document.getElementById('soundBtn').textContent = S.sound ? '🔊' : '🔇';
}
function speakWord(word) { speak(word); }

// ─── SCORE ───────────────────────────────────────────────────
function addScore(n) {
  S.score += n;
  document.getElementById('scoreDisplay').textContent = S.score;
  document.getElementById('scoreDisplay').style.transform = 'scale(1.4)';
  setTimeout(()=>document.getElementById('scoreDisplay').style.transform='',300);
}

// ─── CONFETTI ─────────────────────────────────────────────────
function confetti() {
  const wrap = document.getElementById('confettiWrap');
  wrap.style.display='block'; wrap.innerHTML='';
  const cols=['#C8102E','#003087','#F5A623','#15803D','#FFF','#FF69B4'];
  for(let i=0;i<100;i++){
    const d=document.createElement('div'); d.className='conf';
    d.style.cssText=`left:${Math.random()*100}%;background:${cols[~~(Math.random()*cols.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;animation-delay:${Math.random()*2}s;animation-duration:${2+Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    wrap.appendChild(d);
  }
  setTimeout(()=>{wrap.style.display='none';wrap.innerHTML='';},5000);
}

// ─── PAGES ───────────────────────────────────────────────────
const PAGES = [
  { id:'cover' },
  { id:'mouse1',    title:'Lær å bruke musen',        icon:'🖱️',  sub:'Datakurs – modul 1' },
  { id:'mouse2',    title:'Klikk på riktig bilde!',   icon:'🖱️',  sub:'Datakurs – modul 1' },
  { id:'vocab1',    title:'17. mai – nye ord',        icon:'📖',  sub:'Norsk – modul 2' },
  { id:'vocab2',    title:'Hva er dette?',            icon:'🇳🇴',  sub:'Norsk – modul 2' },
  { id:'match1',    title:'Koble bilde og ord',       icon:'🔗',  sub:'Norsk – modul 3' },
  { id:'numbers',   title:'Tall på norsk',            icon:'🔢',  sub:'Norsk & data – modul 4' },
  { id:'keyboard1', title:'Finn bokstavene',          icon:'⌨️',  sub:'Datakurs – modul 5' },
  { id:'keyboard2', title:'Skriv ordet',              icon:'✍️',  sub:'Datakurs – modul 5' },
  { id:'quiz1',     title:'Quiz – hva ser du?',       icon:'🧠',  sub:'Norsk – modul 6' },
  { id:'quiz2',     title:'Quiz – hva gjør du?',      icon:'💻',  sub:'Data – modul 6' },
  { id:'nav1',      title:'Naviger på skjermen',      icon:'🖥️',  sub:'Datakurs – modul 7' },
  { id:'sentence',  title:'Lag en setning',           icon:'✏️',  sub:'Norsk – modul 8' },
  { id:'score',     title:'Bra jobbet!',              icon:'🏅',  sub:'Oppsummering' },
  { id:'diploma',   title:'Diplom',                   icon:'🏆',  sub:'Gratulerer!' },
];

// ─── VOCABULARY DATA ─────────────────────────────────────────
const VOCAB = [
  { emoji:'🇳🇴', word:'FLAGG',    sub:'flagget',    speak:'flagg' },
  { emoji:'🍦',  word:'IS',       sub:'en is',      speak:'is' },
  { emoji:'🎺',  word:'KORPS',    sub:'korps',      speak:'korps' },
  { emoji:'🎈',  word:'BALLONG',  sub:'en ballong', speak:'ballong' },
  { emoji:'👗',  word:'BUNAD',    sub:'bunaden',    speak:'bunad' },
  { emoji:'🥁',  word:'TROMME',   sub:'en tromme',  speak:'tromme' },
  { emoji:'🖥️', word:'PC',       sub:'en PC',      speak:'pe se' },
  { emoji:'🖱️', word:'MUS',      sub:'en mus',     speak:'mus' },
  { emoji:'⌨️', word:'TASTATUR', sub:'tastaturet', speak:'tastatur' },
  { emoji:'📧',  word:'E-POST',   sub:'e-posten',   speak:'e-post' },
];

// ─── RENDER ──────────────────────────────────────────────────
function render() {
  const p = PAGES[S.page];
  const pct = (S.page+1)/PAGES.length*100;
  document.getElementById('progFill').style.width = pct+'%';

  // dots
  const dots = document.getElementById('moduleDots');
  dots.innerHTML = PAGES.map((_,i)=>`
    <button class="module-dot ${i<S.page?'done':i===S.page?'active':''}" onclick="goTo(${i})" title="Side ${i+1}"></button>
  `).join('');

  document.getElementById('stage').innerHTML = builders[p.id] ? builders[p.id]() : `<div class="card"><div class="card-body">Mangler</div></div>`;
  afterRender(p.id);
}

function goTo(i) { S.page=i; render(); window.scrollTo(0,0); }
function next()  { if(S.page<PAGES.length-1){S.page++;render();window.scrollTo(0,0);} }
function prev()  { if(S.page>0){S.page--;render();window.scrollTo(0,0);} }

function navBtns(hideNext=false) {
  return `<div class="btn-row">
    <button class="btn btn-prev" onclick="prev()" ${S.page===0?'disabled':''}>← Tilbake</button>
    ${hideNext?'':'<button class="btn btn-next" onclick="next()">Neste → </button>'}
  </div>`;
}

function cardWrap(icon, title, span, sub, body) {
  return `<div class="card">
    <div class="card-header">
      <div class="card-icon">${icon}</div>
      <div><div class="card-title">${title}${span?` <span>${span}</span>`:''}</div><div class="card-sub">${sub}</div></div>
    </div>
    <div class="card-body">${body}</div>
  </div>`;
}

function showFB(id, msg, type) {
  const el=document.getElementById(id);
  if(!el) return;
  el.innerHTML=`<span>${type==='good'?'✅':'type'==='bad'?'❌':'💡'}</span> ${msg}`;
  el.className=`feedback ${type} show`;
}

let clickCount = 0;
function mouseClick() {
  const tgt = document.getElementById('mouseTarget');
  const arena = document.getElementById('mouseArena');
  const cnt = document.getElementById('clickCount');
  if(!tgt||!arena||!cnt) return;
  clickCount++;
  cnt.textContent = clickCount;
  speak(clickCount <= 5 ? String(clickCount) : 'Bra!');
  tgt.style.transform = 'scale(1.2)';
  setTimeout(()=>tgt.style.transform='',200);
  // move target to random position
  const maxX = arena.offsetWidth  - 110;
  const maxY = arena.offsetHeight - 110;
  tgt.style.left = (20 + Math.random()*maxX)+'px';
  tgt.style.top  = (10 + Math.random()*maxY)+'px';
  tgt.style.transform = '';
  if(clickCount >= 5) {
    addScore(10);
    showFeedbackEl('mouse1-fb','🎉 Flott! Du kan klikke med musen!','good');
    setTimeout(next, 1800);
  }
}
function showFeedbackEl(id, msg, type) {

    </div>
    <div>
      <div class="match-col-title">📝 Ord</div>

`)};

function matchClick(side, slot) {
  const el = document.getElementById(`m${side}-${slot}`);
  if(!el || el.classList.contains('paired')) return;
  if(matchSelSide===null) {
    matchSelSide=side; matchSelSlot=slot;
    el.classList.add('sel');
  } else if(matchSelSide===side) {
    document.getElementById(`m${matchSelSide}-${matchSelSlot}`)?.classList.remove('sel');
    matchSelSide=side; matchSelSlot=slot; el.classList.add('sel');
  } else {
    const prevEl = document.getElementById(`m${matchSelSide}-${matchSelSlot}`);
    const lEl = side==='L'?el:prevEl, rEl = side==='R'?el:prevEl;
    prevEl?.classList.remove('sel'); el.classList.remove('sel');
    if(lEl.dataset.pair===rEl.dataset.pair) {
      lEl.classList.add('paired'); rEl.classList.add('paired');
      const pi = parseInt(lEl.dataset.pair);
      speak(matchData[pi].word);
      addScore(8);
      const done = document.querySelectorAll('.match-item.paired').length/2;
      if(done===matchData.length){addScore(20);showFeedbackEl('match1-fb','🏆 Du koblet alle riktig! Kjempebra!','good');confetti();}
      else showFeedbackEl('match1-fb',`✅ Riktig! ${done} av ${matchData.length} koblet!`,'good');
    } else {
      [lEl,rEl].forEach(e=>{e?.classList.add('wrong-flash');setTimeout(()=>e?.classList.remove('wrong-flash'),500);});
      showFeedbackEl('match1-fb','❌ Prøv igjen!','bad');
    }
    matchSelSide=null; matchSelSlot=null;
  }
}

builders.quiz2 = () => {
  q2Idx=0; q2Score=0;
  return cardWrap('💻','Quiz –','hva gjør du?','Data – modul 6', buildQ2());
};
function buildQ2() {
  if(q2Idx>=quiz2Data.length){
    addScore(q2Score*5);
    return `<div style="text-align:center;padding:30px 0;">
      <div style="font-size:72px;">💻🎉</div>
      <div style="font-size:28px;font-weight:900;color:var(--blue);margin-top:12px;">Du kan bruke PC!</div>
      <div style="font-size:20px;color:var(--gray);margin-top:8px;font-weight:700;">${q2Score} av ${quiz2Data.length} riktige</div>
    </div>${navBtns()}`;
  }
  const d=quiz2Data[q2Idx];
  return `
  <div class="quiz-img">${d.img}</div>
  <div class="quiz-q">${d.q}</div>
  <div class="quiz-opts" id="q2opts">
    ${d.opts.map((o,i)=>`<div class="quiz-opt" onclick="ansQ2(${i},${d.a})">${o.e} ${o.t}</div>`).join('')}
  </div>
  <div class="feedback" id="q2-fb"></div>
  <div style="text-align:center;margin-top:10px;color:var(--gray);font-size:13px;font-weight:700;">Spørsmål ${q2Idx+1} av ${quiz2Data.length}</div>
  ${navBtns(true)}`;
}
function ansQ2(i,correct) {
  const opts=document.querySelectorAll('#q2opts .quiz-opt');
  opts.forEach(o=>o.classList.add('locked'));
  opts[correct].classList.add('correct');
  if(i===correct){speak('Riktig!');q2Score++;showFeedbackEl('q2-fb','✅ Riktig!','good');}
  else{opts[i].classList.add('wrong');speak('Prøv igjen');showFeedbackEl('q2-fb','❌ Feil – riktig svar er i grønt!','bad');}
  q2Idx++;
  setTimeout(()=>{document.querySelector('.card-body').innerHTML=buildQ2();afterRender('quiz2');},1800);
}

  <div class="instr"><div class="instr-icon">👆</div> Lær disse viktige knappene – klikk for å høre!</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">
    ${[
      ['🔙','Tilbake','Gå til forrige side','tilbake'],
      ['🏠','Hjem','Gå til startsiden','hjem'],
      ['🔍','Søk','Finn noe på nettet','søk'],
      ['📂','Mapper','Se filene dine','mapper'],
      ['📧','E-post','Send og les meldinger','e-post'],
      ['❌','Lukk','Lukk vinduet','lukk'],
      ['🖨️','Skriv ut','Skriv ut på papir','skriv ut'],
      ['💾','Lagre','Ta vare på arbeidet','lagre'],
    ].map(([e,t,d,s])=>`
    <div class="word-card" onclick="speak('${s}')" style="display:flex;align-items:center;gap:14px;text-align:left;padding:14px;">
      <span style="font-size:36px;flex-shrink:0;">${e}</span>
      <div>
        <div style="font-size:17px;font-weight:900;">${t}</div>

  </div>
  <div class="tip-box">
    <div class="tip-box-title">👩‍🏫 Tips til lærer:</div>
    Bruk en projektor og vis disse knappene i en ekte nettleser. La deltakerne klikke selv. Øv på å åpne og lukke vinduer.
  </div>
  ${navBtns()}
`);

// SENTENCE
const sentWords = ['FLAGG','ER','NORSK','I','RØDT','BLÅTT','HVITT'];
let sentBuilt = [];
builders.sentence = () => {
  sentBuilt=[];
  return cardWrap('✏️','Lag en','setning','Norsk – modul 8',`
  <div class="instr"><div class="instr-icon">✏️</div> Trykk på ordene for å lage en setning om 17. mai!</div>
  <div id="sentDisplay" style="min-height:72px;background:var(--blue);color:white;border-radius:16px;padding:16px 20px;font-size:28px;font-weight:900;margin-bottom:16px;letter-spacing:2px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
    <span style="opacity:.4;font-size:18px;">Klikk på ordene under...</span>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
    ${sentWords.map(w=>`
    <div style="background:var(--blue-p);border:2.5px solid var(--blue);border-radius:14px;padding:12px 20px;font-size:20px;font-weight:900;cursor:pointer;color:var(--blue);transition:all .2s;"
      onclick="addSentWord('${w}',this)">${w}</div>`).join('')}
  </div>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-check" onclick="checkSent()">✅ Les setningen</button>
    <button class="btn btn-retry" onclick="render()">🔄 Start på nytt</button>
  </div>
  <div class="feedback" id="sent-fb"></div>
  ${navBtns()}
`)};
function addSentWord(w,el) {
  sentBuilt.push(w);
  el.style.opacity='.35'; el.style.pointerEvents='none';
  const disp=document.getElementById('sentDisplay');
  if(disp){
    disp.innerHTML=sentBuilt.map(x=>`<span style="background:rgba(255,255,255,.15);border-radius:10px;padding:4px 12px;">${x}</span>`).join('');
  }
}
function checkSent() {
  if(sentBuilt.length===0){showFeedbackEl('sent-fb','👆 Velg noen ord først!','bad');return;}
  const sent=sentBuilt.join(' ');
  speak(sent);
  addScore(15);
  showFeedbackEl('sent-fb','🔊 Setningen din: '+sent,'good');
}

// SCORE PAGE
builders.score = () => {
  const total = S.score;
  const pct = Math.min(100, Math.round(total/200*100));
  const medal = pct>=90?'🥇':pct>=70?'🥈':pct>=50?'🥉':'🎖️';
  const msg = pct>=90?'Norgesekspert og PC-proff!':pct>=70?'Veldig bra innsats!':pct>=50?'Bra jobbet – fortsett!':'Øv mer og prøv igjen!';
  return cardWrap('🏅','Bra','jobbet!','Oppsummering',`
  <div style="text-align:center;padding:16px 0 24px;">
    <div style="font-size:80px;">${medal}</div>
    <div style="font-size:52px;font-weight:900;color:var(--blue);margin-top:8px;">${total} ⭐</div>
    <div style="font-size:20px;color:var(--gray);font-weight:700;margin-top:4px;">${msg}</div>
  </div>
  <div style="background:var(--blue-p);border-radius:16px;padding:20px;margin-bottom:20px;">
    <div style="font-size:16px;font-weight:900;color:var(--blue);margin-bottom:14px;">📋 Du har lært i dag:</div>
    ${[['🖱️','Bruke musen – klikke og navigere'],['📖','Norske 17. mai-ord'],['🔢','Tall på norsk (0–10)'],['⌨️','Skrive på tastaturet'],['🧠','Quiz om bilder og data'],['🔗','Koble bilder og ord']].map(([e,t])=>`
    <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--light);">
      <span style="font-size:24px;">${e}</span>
      <span style="font-size:15px;font-weight:700;">${t}</span>
      <span style="margin-left:auto;color:var(--green);font-size:18px;">✅</span>
    </div>`).join('')}
  </div>
  ${navBtns()}
`)};

  return `<div class="card"><div class="card-body">
  <div class="diploma-wrap">

    <div style="font-size:15px;color:var(--gray);font-weight:700;margin-bottom:12px;">for fullført Norsk & Data – 17. mai-kurs</div>
    <div style="font-size:16px;color:var(--gray);font-weight:700;margin-bottom:6px;">Tildeles herved til</div>

      Du har lært å bruke <b>PC og mus</b>, lært <b>norske ord</b>,<br>
      øvd på <b>tastaturet</b> og bestått <b>quiz</b>.<br>
      <b style="color:var(--red);">Gratulerer med dagen! 🎉</b>
    </div>
    <div style="display:flex;justify-content:space-around;margin-top:36px;">
      <div style="text-align:center;">
        <div style="border-bottom:2px solid var(--gray);width:150px;height:40px;margin-bottom:4px;"></div>
        <div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Dato</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:28px;">⭐ ${S.score} poeng</div>
        <div style="font-family:serif;font-size:14px;color:var(--gold);font-weight:700;">GRATULERER!</div>
      </div>
      <div style="text-align:center;">
        <div style="border-bottom:2px solid var(--gray);width:150px;height:40px;margin-bottom:4px;"></div>
        <div style="font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:1px;">Lærer</div>
      </div>
    </div>
    <button class="btn btn-check btn-big" style="margin-top:24px;" onclick="confetti();speak('Gratulerer med dagen!')">🎉 Feir deg selv!</button>
  </div>
  ${navBtns()}

};

// ─── AFTER RENDER ─────────────────────────────────────────────
function afterRender(id) {
  // auto-focus keyboard inputs
  const inp = document.getElementById('kbInp') || document.getElementById('kb2Inp');
  if(inp) setTimeout(()=>inp.focus(),300);
  // reset click counter on mouse1
  if(id==='mouse1') clickCount=0;
  // auto-speak instructions
  const instrMap = {
    mouse1:  'Klikk på flagget fem ganger',
    mouse2:  'Finn og klikk på riktig bilde',
    vocab1:  'Klikk på hvert kort for å høre ordet',
    vocab2:  'Hvilket ord er dette?',
    match1:  'Koble bilde og ord',
    numbers: 'Klikk på et tall for å høre det',
    keyboard1:'Skriv ordet på tastaturet',
    keyboard2:'Se på ordet og skriv det av',
    quiz1:   'Hva ser du?',
    quiz2:   'Hva gjør du på PC?',
  };
  if(instrMap[id] && S.sound) setTimeout(()=>speak(instrMap[id]),600);
}

// ─── INIT ─────────────────────────────────────────────────────
render();
</script>
